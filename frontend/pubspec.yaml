name: gazlink_app
description: Application mobile GAZLINK pour la livraison de gaz domestique.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.0.0
  supabase_flutter: ^2.0.0  # SDK Supabase pour Flutter
  geolocator: ^12.0.0       # Pour la géolocalisation
  google_maps_flutter: ^2.6.0  # Pour les cartes
  flutter_dotenv: ^5.1.0    # Pour les variables d'environnement
  # intl: ^0.19.0             # Pour le formatage des dates
  provider: ^6.1.0          # Pour la gestion d'état (optionnel)
  http: ^1.1.0
  intl: ^0.20.2
  flutter_svg: ^2.0.0
  lottie: ^2.3.0
  go_router: ^10.0.0
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  animations: ^2.0.0
  cupertino_icons: ^1.0.0
  material_design_icons_flutter: ^7.0.0
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
